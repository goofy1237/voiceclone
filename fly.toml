# fly.toml app configuration file generated for ai-closer-mvp on 2026-04-29T23:12:53+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-closer-mvp'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
